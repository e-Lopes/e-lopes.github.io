<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#667eea" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="DigiStats" />
        <title>DigiStats - Tournaments</title>
        <link rel="icon" type="image/png" href="icons/favicon/favicon.png" />
        <link rel="apple-touch-icon" href="icons/icons-192.png" />
        <link rel="manifest" href="manifest.json" />
        <link rel="stylesheet" href="styles.css" />
        <link rel="stylesheet" href="styles/components/utilities.css" />
        <link rel="stylesheet" href="styles/components/states.css" />
        <link rel="stylesheet" href="styles/pages/players.css" />
    </head>
    <body class="dashboard-home">
        <div class="container">
            <header class="dashboard-home-header">
                <div class="logo-wrapper">
                    <a href="https://github.com/e-Lopes/e-lopes.github.io" target="_blank" rel="noopener noreferrer" title="View on GitHub"
                        style="display:inline-block;cursor:pointer;transition:transform 0.2s,filter 0.2s;"
                        onmouseover="this.style.transform='scale(1.08)';this.style.filter='brightness(1.15) drop-shadow(0 0 8px rgba(255,255,255,0.3))'"
                        onmouseout="this.style.transform='scale(1)';this.style.filter='none'"
                        onclick="if(window.innerWidth<=768)event.preventDefault()">
                        <img src="icons/logo.png" alt="DigiStats" class="header-logo" />
                    </a>
                </div>

                <p class="subtitle">Digimon TCG Tournament Management</p>
                <div class="nav-buttons-wrapper">
                    <button type="button" id="btnShowTournamentsNav" class="nav-button is-active">
                        <span class="nav-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="4" width="18" height="17" rx="2"></rect>
                                <path d="M8 2v4M16 2v4M3 10h18"></path>
                            </svg>
                        </span>
                        <span>Tournaments</span>
                    </button>
                    <button type="button" id="btnManageDecksNav" class="nav-button">
                        <span class="nav-icon" aria-hidden="true">
                            <img src="icons/digivice.svg" alt="" class="nav-icon-digivice" />
                        </span>
                        <span>Decks</span>
                    </button>
                    <button type="button" id="btnManagePlayersNav" class="nav-button">
                        <span class="nav-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="9" cy="8" r="3"></circle>
                                <path d="M4 18c0-2.8 2.2-5 5-5s5 2.2 5 5"></path>
                                <circle cx="17" cy="10" r="2"></circle>
                                <path d="M15.2 18c.3-1.9 1.8-3.4 3.8-3.8"></path>
                            </svg>
                        </span>
                        <span>Players</span>
                    </button>
                    <button type="button" id="btnShowStatisticsNav" class="nav-button">
                        <span class="nav-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 20h18"></path>
                                <path d="M7 16V9"></path>
                                <path d="M12 16V5"></path>
                                <path d="M17 16v-3"></path>
                            </svg>
                        </span>
                        <span>Statistics</span>
                    </button>
                    <button type="button" id="btnAdminNav" class="nav-button">
                        <span class="nav-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="8" r="4"></circle>
                                <path d="M12 14c-5 0-8 2-8 4v1h16v-1c0-2-3-4-8-4z"></path>
                                <path d="M18 3l1.5 3L23 7l-2.5 2 .5 3-3-1.5L15 12l.5-3L13 7l3.5-1z"></path>
                            </svg>
                        </span>
                        <span>Admin</span>
                    </button>
                </div>
            </header>

            <div class="filters-row">
                <button
                    type="button"
                    id="btnCreateTournament"
                    class="btn-create-filter"
                    title="Create Tournament"
                    aria-label="Create Tournament"
                >
                    <svg
                        class="btn-create-icon"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        aria-hidden="true"
                    >
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                    Add Tournament
                </button>
                <div class="form-group filter-group">
                    <label for="filterStore">Store</label>
                    <select id="filterStore" class="filter-select">
                        <option value="">All stores</option>
                    </select>
                </div>
                <div class="form-group filter-group">
                    <label for="filterTournamentName">Tournament Name</label>
                    <select id="filterTournamentName" class="filter-select">
                        <option value="">All names</option>
                    </select>
                </div>
                <div class="form-group filter-group">
                    <label for="filterInstagram">Instagram Link</label>
                    <select id="filterInstagram" class="filter-select">
                        <option value="">All</option>
                        <option value="with_link">With link</option>
                        <option value="without_link">Without link</option>
                    </select>
                </div>
                <div class="form-group filter-group">
                    <label for="filterMonthYear">Month/Year</label>
                    <select id="filterMonthYear" class="filter-select">
                        <option value="">All months</option>
                    </select>
                </div>
                <div class="form-group filter-group per-page-filter">
                    <select id="perPageSelect" aria-label="Items per page"></select>
                </div>
                <div class="filter-actions">
                    <span class="filter-label-spacer" aria-hidden="true">Instagram Link</span>
                    <button
                        type="button"
                        id="btnToggleView"
                        class="btn-toggle-view"
                        title="Toggle Calendar/List"
                        aria-label="Toggle Calendar/List"
                    >
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            aria-hidden="true"
                        >
                            <rect x="3" y="4" width="18" height="18" rx="2" />
                            <path d="M8 2v4M16 2v4M3 10h18" />
                        </svg>
                    </button>
                    <button
                        type="button"
                        id="btnClearFilters"
                        class="btn-clear-filters"
                        title="Clear Filters"
                        aria-label="Clear Filters"
                    >
                        <svg
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            aria-hidden="true"
                        >
                            <path d="M3 4h18" />
                            <path d="M6 4v2l5 6v6l2-1v-5l5-6V4" />
                            <path d="M9 9l6 6" />
                            <path d="M15 9l-6 6" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="listViewContainer">
                <table id="tournamentsTable">
                    <thead>
                        <tr>
                            <th>
                                <button
                                    type="button"
                                    class="sort-button"
                                    data-sort-field="tournament_date"
                                >
                                    <svg
                                        class="th-icon"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        aria-hidden="true"
                                    >
                                        <rect x="3" y="4" width="18" height="18" rx="2" />
                                        <path d="M8 2v4M16 2v4M3 10h18" />
                                    </svg>
                                    Tournament Date
                                    <span
                                        class="sort-indicator"
                                        data-sort-indicator="tournament_date"
                                        >?</span
                                    >
                                </button>
                            </th>
                            <th>
                                <span class="th-with-icon">
                                    <svg
                                        class="th-icon"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        aria-hidden="true"
                                    >
                                        <path d="M3 10l2-6h14l2 6" />
                                        <path d="M4 10h16v10H4z" />
                                        <path d="M9 20v-6h6v6" />
                                    </svg>
                                    Store
                                </span>
                            </th>
                            <th>
                                <span class="th-with-icon">
                                    <svg
                                        class="th-icon"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        aria-hidden="true"
                                    >
                                        <circle cx="12" cy="14" r="4" />
                                        <path d="M10 3h4l-1 5h-2z" />
                                        <path d="M9 3l-3 5 3 1" />
                                        <path d="M15 3l3 5-3 1" />
                                    </svg>
                                    Tournament Name
                                </span>
                            </th>
                            <th>
                                <button
                                    type="button"
                                    class="sort-button"
                                    data-sort-field="total_players"
                                >
                                    <svg
                                        class="th-icon"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        aria-hidden="true"
                                    >
                                        <rect x="4" y="5" width="16" height="14" rx="2" />
                                        <path d="M8 9h8M8 13h8" />
                                    </svg>
                                    Total Players
                                    <span class="sort-indicator" data-sort-indicator="total_players"
                                        >?</span
                                    >
                                </button>
                            </th>
                            <th>
                                <span class="th-with-icon">
                                    <svg
                                        class="th-icon"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        aria-hidden="true"
                                    >
                                        <path
                                            d="M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 0 0-7.07-7.07L10 5"
                                        />
                                        <path
                                            d="M14 11a5 5 0 0 0-7.07 0L4.1 13.83a5 5 0 1 0 7.07 7.07L14 19"
                                        />
                                    </svg>
                                    Link
                                </span>
                            </th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div class="pagination" id="pagination"></div>
            </div>

            <div id="calendarViewContainer" class="calendar-view-container is-hidden"></div>
            <div id="calendarTournamentDetails" class="calendar-tournament-details is-hidden"></div>
            <div id="decksDynamicContainer" class="is-hidden"></div>
            <div id="playersDynamicContainer" class="is-hidden"></div>
            <div id="statisticsDynamicContainer" class="is-hidden"></div>
            <div id="adminDynamicContainer" class="is-hidden"></div>

            <template id="decksContainerTemplate">
                <div class="decks-container">
                    <!-- Row 1: add -->
                    <div class="decks-row decks-row-add">
                        <button id="btnOpenCreateDeckModal" class="btn-primary" type="button">
                            <svg
                                class="btn-create-icon"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                aria-hidden="true"
                            >
                                <path d="M12 5v14M5 12h14" />
                            </svg>
                            Add Deck
                        </button>
                    </div>

                    <!-- Row 2: search + month + view toggle -->
                    <div class="decks-row decks-row-search">
                        <input
                            type="text"
                            id="searchInput"
                            class="search-input decks-search-input"
                            placeholder="Search decks by name..."
                        />
                        <select
                            id="deckRankMonthSelect"
                            class="deck-month-select decks-month-select"
                            title="Month filter"
                            aria-label="Month filter"
                        >
                            <option value="">Latest month</option>
                        </select>
                        <button
                            type="button"
                            id="viewToggleBtn"
                            class="btn-view-toggle"
                            title="Change view"
                            aria-label="Change view"
                        ></button>
                    </div>

                    <!-- Row 3: total + per page -->
                    <div class="decks-row decks-row-meta">
                        <span class="decks-total" id="decksTotalCount">Total: 0</span>
                        <label class="decks-per-page-label">
                            Per page
                            <select
                                id="pageSizeSelect"
                                class="page-size-select decks-page-size"
                                title="Items per page"
                                aria-label="Items per page"
                            >
                                <option value="4">4</option>
                                <option value="8" selected>8</option>
                                <option value="12">12</option>
                                <option value="24">24</option>
                                <option value="40">40</option>
                                <option value="80">80</option>
                            </select>
                        </label>
                    </div>

                    <div id="decksList" class="decks-grid">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Loading decks...</p>
                        </div>
                    </div>

                    <div id="emptyState" class="empty-state u-hidden">
                        <div class="empty-state-icon">&#127183;</div>
                        <h3>No decks registered</h3>
                        <p>Start by adding your first deck!</p>
                        <button type="button" id="btnEmptyStateAddDeck" class="btn-primary u-mt-20">
                            Add First Deck
                        </button>
                    </div>

                    <div id="noResults" class="empty-state u-hidden">
                        <div class="empty-state-icon">&#128269;</div>
                        <h3>No decks found</h3>
                        <p>Try searching with different terms.</p>
                        <button
                            type="button"
                            id="btnNoResultsClearSearch"
                            class="btn-secondary u-mt-20"
                        >
                            Clear search
                        </button>
                    </div>
                    <div class="pagination" id="decksPagination"></div>
                </div>
            </template>

            <template id="playersContainerTemplate">
                <div class="players-container-embedded">
                    <!-- Row 1: cadastro -->
                    <div class="players-row players-row-add">
                        <button type="button" id="btnAddPlayer" class="btn-primary players-add-btn">
                            <svg class="btn-create-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                                <path d="M12 5v14M5 12h14"></path>
                            </svg>
                            Add Player
                        </button>
                    </div>

                    <!-- Row 2: filtro -->
                    <div class="players-row players-row-search">
                        <input
                            type="text"
                            id="searchInput"
                            class="search-input players-search-input"
                            placeholder="Search players by name..."
                        />
                    </div>

                    <!-- Row 3: contador + por página -->
                    <div class="players-row players-row-meta">
                        <span class="stats-counter">Total: <span id="totalPlayersCount">0</span></span>
                        <label class="players-per-page-label">
                            Per page
                            <select
                                id="pageSizeSelect"
                                class="page-size-select players-page-size"
                                title="Items per page"
                                aria-label="Items per page"
                            >
                                <option value="5">5</option>
                                <option value="10" selected>10</option>
                                <option value="15">15</option>
                                <option value="30">30</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>
                        </label>
                    </div>

                    <div id="playersList" class="players-list">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>

                    <div class="pagination" id="playersPagination"></div>

                    <div id="emptyState" class="empty-state u-hidden">
                        <p>No players found.</p>
                    </div>
                </div>
            </template>

            <template id="statisticsContainerTemplate">
                <div class="statistics-container-embedded">
                    <div class="page-header statistics-header">
                        <div class="statistics-controls">
                            <div class="statistics-primary-controls">
                                <label for="statisticsViewSelect" class="statistics-select-label"
                                    >Estat&iacute;stica:</label
                                >
                                <div class="statistics-main-selects">
                                    <select
                                        id="statisticsViewSelect"
                                        class="statistics-select"
                                        title="Statistics view"
                                        aria-label="Statistics view"
                                    >
                                        <option value="meta_overview">Meta Overview</option>
                                        <option value="v_deck_representation">
                                            Representa&ccedil;&atilde;o de Decks</option>
                                        <option value="v_deck_stats" selected>Estat&iacute;sticas de Decks</option>
                                        <option value="v_top_cards_by_month">Top Cards</option>
                                        <option value="v_player_ranking">Ranking de Players</option>
                                        <option value="v_store_champions">Ranking por Loja</option>
                                    </select>
                                    <select
                                        id="statisticsFilterStore"
                                        class="statistics-select is-hidden"
                                        title="Filtrar por loja"
                                        aria-label="Filtrar por loja"
                                    >
                                        <option value="">Todas as lojas</option>
                                    </select>
                                </div>
                            </div>
                            <div class="statistics-secondary-controls">
                                <select
                                    id="statisticsFilterFormat"
                                    class="statistics-select is-hidden"
                                    title="Filtrar por formato"
                                    aria-label="Filtrar por formato"
                                >
                                    <option value="">Todos os formatos</option>
                                </select>
                                <select
                                    id="statisticsFilterMonth"
                                    class="statistics-select is-hidden"
                                    title="Filtrar por mes"
                                    aria-label="Filtrar por mes"
                                >
                                    <option value="">Todos os meses</option>
                                </select>
                                <select
                                    id="statisticsFilterDate"
                                    class="statistics-select is-hidden"
                                    title="Filtrar por data"
                                    aria-label="Filtrar por data"
                                >
                                    <option value="">Todas as datas</option>
                                </select>
                                <select
                                    id="statisticsFilterStaple"
                                    class="statistics-select is-hidden"
                                    title="Filtrar por staple"
                                    aria-label="Filtrar por staple"
                                >
                                    <option value="">Todas as cartas</option>
                                    <option value="true">Somente staple</option>
                                </select>
                                <input
                                    type="text"
                                    id="statisticsFilterDeck"
                                    class="statistics-deck-search is-hidden"
                                    placeholder="Buscar deck..."
                                    aria-label="Filtrar por deck"
                                    autocomplete="off"
                                    list="statisticsDeckDatalist"
                                />
                                <datalist id="statisticsDeckDatalist"></datalist>
                                <input
                                    type="text"
                                    id="statisticsPlayerSearch"
                                    class="statistics-player-search is-hidden"
                                    placeholder="Buscar player..."
                                    aria-label="Buscar player no Store Champions"
                                    autocomplete="off"
                                />
                                <button
                                    type="button"
                                    id="btnToggleStoreCards"
                                    class="btn-secondary statistics-toggle-stores is-hidden"
                                >
                                    Expandir lojas
                                </button>
                            </div>
                            <p id="statisticsFormulaHint" class="statistics-formula-hint"></p>
                        </div>
                    </div>
                    <div id="statisticsChartArea" class="statistics-chart-area is-hidden"></div>
                    <div class="statistics-data-card">
                        <p id="statisticsStatus" class="statistics-status">
                            Select a view to load data.
                        </p>
                    </div>
                    <div class="statistics-table-wrapper">
                        <table id="statisticsTable" class="statistics-table">
                            <thead></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </template>
            <template id="adminContainerTemplate">
                <div class="admin-container" id="adminContainer">
                    <div class="page-header">
                        <h1 class="page-title">Administration</h1>
                        <div class="admin-tabs">
                            <button type="button" class="admin-tab-btn is-active" data-admin-tab="formats">Formats / Meta</button>
                            <button type="button" class="admin-tab-btn" data-admin-tab="banlist">Ban List</button>
                            <button type="button" class="admin-tab-btn" data-admin-tab="stores">Stores</button>
                            <button type="button" class="admin-tab-btn" data-admin-tab="datarepair">Data Repair</button>
                        </div>
                    </div>

                    <!-- Formats / Meta panel -->
                    <div data-admin-panel="formats" class="admin-panel">
                        <div class="admin-panel-header">
                            <div>
                                <h2 class="admin-panel-title">Formats / Meta</h2>
                                <p class="admin-panel-desc">Manage tournament formats. The default format is pre-selected when creating tournaments.</p>
                            </div>
                            <button type="button" class="btn-primary" data-admin-action="create-format">+ New Format</button>
                        </div>
                        <div class="admin-table-wrapper">
                            <table class="admin-table">
                                <thead>
                                    <tr>
                                        <th>Code</th>
                                        <th>Name</th>
                                        <th>Default</th>
                                        <th>Status</th>
                                        <th>Background</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="adminFormatsBody"></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Ban List panel -->
                    <div data-admin-panel="banlist" class="admin-panel is-hidden">
                        <div class="admin-panel-header">
                            <div>
                                <h2 class="admin-panel-title">Ban List</h2>
                                <p class="admin-panel-desc">Manage card restrictions. Changes apply to new decklists only — existing registered decklists are not affected.</p>
                            </div>
                            <button type="button" class="btn-primary" data-admin-action="add-ban">+ Add Restriction</button>
                        </div>
                        <div class="admin-banlist-search-row">
                            <input type="text" id="adminBanListSearch" class="search-input" placeholder="Filter by card code or name…" autocomplete="off" />
                            <span id="adminBanListCount" class="admin-dim"></span>
                        </div>
                        <div class="admin-table-wrapper">
                            <table class="admin-table">
                                <thead>
                                    <tr>
                                        <th>Card Code</th>
                                        <th>Name</th>
                                        <th>Restriction</th>
                                        <th>Notes</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="adminBanListBody"></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Stores panel -->
                    <div data-admin-panel="stores" class="admin-panel is-hidden">
                        <div class="admin-panel-header">
                            <div>
                                <h2 class="admin-panel-title">Stores</h2>
                                <p class="admin-panel-desc">Manage tournament venues. Stores are available in the store selector when creating or editing tournaments.</p>
                            </div>
                            <button type="button" class="btn-primary" data-admin-action="create-store">+ New Store</button>
                        </div>
                        <div class="admin-table-wrapper">
                            <table class="admin-table">
                                <thead>
                                    <tr>
                                        <th>Logo</th>
                                        <th>Name</th>
                                        <th>Bandai Nick</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="adminStoresBody"></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Data Repair panel -->
                    <div data-admin-panel="datarepair" class="admin-panel is-hidden">
                        <div class="admin-panel-header">
                            <div>
                                <h2 class="admin-panel-title">Data Repair</h2>
                                <p class="admin-panel-desc">Re-hydrate missing card metadata (name, card_level, card_type) for legacy entries in <code>decklist_card_metadata</code>.</p>
                            </div>
                        </div>
                        <div class="admin-repair-section">
                            <div class="admin-repair-row">
                                <div>
                                    <strong>Card Metadata Repair</strong>
                                    <p class="admin-panel-desc" id="adminRepairMissingCount">Click "Check" to scan for incomplete records.</p>
                                </div>
                                <div class="admin-repair-actions">
                                    <button type="button" class="btn-secondary" data-admin-action="repair-check">Check</button>
                                    <button type="button" class="btn-primary" id="adminRepairRunBtn" data-admin-action="repair-run" disabled>Repair</button>
                                </div>
                            </div>
                            <div id="adminRepairProgress" class="admin-repair-progress is-hidden">
                                <div class="admin-repair-progress-header">
                                    <span id="adminRepairProgressLabel">Aguardando…</span>
                                    <span id="adminRepairProgressPct">0%</span>
                                </div>
                                <div class="admin-repair-progress-track">
                                    <div id="adminRepairProgressBar" class="admin-repair-progress-bar" style="width:0%"></div>
                                </div>
                                <div id="adminRepairProgressDetail" class="admin-repair-progress-detail"></div>
                            </div>
                            <div id="adminRepairLog" class="admin-repair-log is-hidden"></div>
                        </div>
                    </div>

                    <!-- Format Modal -->
                    <div id="adminFormatModal" class="modal-overlay">
                        <div class="modal-content">
                            <h3 class="admin-modal-title">New Format / Meta</h3>
                            <form id="adminFormatForm">
                                <input type="hidden" id="adminFormatId" />
                                <div class="form-group">
                                    <label for="adminFormatCode">Code <span class="required">*</span></label>
                                    <input type="text" id="adminFormatCode" placeholder="e.g. BT19" required autocomplete="off" style="text-transform:uppercase" />
                                </div>
                                <div class="form-group">
                                    <label for="adminFormatName">Name</label>
                                    <input type="text" id="adminFormatName" placeholder="e.g. BT19 Meta" autocomplete="off" />
                                </div>
                                <div class="form-group" style="display:flex;gap:24px;align-items:center;">
                                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                                        <input type="checkbox" id="adminFormatIsActive" />
                                        Active
                                    </label>
                                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                                        <input type="checkbox" id="adminFormatIsDefault" />
                                        Set as Default
                                    </label>
                                </div>
                                <div class="form-group">
                                    <label>Background Image</label>
                                    <div class="admin-bg-selected-preview" id="adminFormatBgSelectedWrap" style="display:none;">
                                        <img id="adminFormatBgPreview" alt="Selected background" />
                                        <button type="button" class="admin-bg-clear-btn" data-admin-action="clear-format-bg" title="Remove background">✕</button>
                                    </div>
                                    <input type="hidden" id="adminFormatBgUrl" />
                                    <input type="hidden" id="adminFormatBgPath" />
                                    <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;">
                                        <label class="btn-secondary admin-upload-label">
                                            Upload new
                                            <input type="file" id="adminFormatFile" accept="image/*" style="display:none;" />
                                        </label>
                                        <button type="button" class="btn-secondary" data-admin-action="browse-bucket-images">Browse existing</button>
                                    </div>
                                    <div id="adminBucketBrowser" class="admin-bucket-browser is-hidden">
                                        <div id="adminBucketImages" class="admin-bucket-grid"></div>
                                    </div>
                                </div>
                                <p id="adminFormatStatus" class="admin-form-status"></p>
                                <div class="modal-actions">
                                    <button type="submit" class="btn-save">Save</button>
                                    <button type="button" class="btn-cancel" data-admin-action="close-format-modal">Cancel</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Ban Modal -->
                    <div id="adminBanModal" class="modal-overlay">
                        <div class="modal-content">
                            <h3 class="admin-modal-title">Add Restriction</h3>
                            <form id="adminBanForm">
                                <input type="hidden" id="adminBanOriginalCode" />
                                <div class="form-group">
                                    <label for="adminBanCardCode">Card Code <span class="required">*</span></label>
                                    <input type="text" id="adminBanCardCode" placeholder="e.g. BT7-072" required autocomplete="off" style="text-transform:uppercase" />
                                    <div class="admin-ban-card-preview" id="adminBanCardPreview"></div>
                                </div>
                                <div class="form-group">
                                    <label for="adminBanRestriction">Restriction <span class="required">*</span></label>
                                    <select id="adminBanRestriction">
                                        <option value="limited">Limited (1 copy)</option>
                                        <option value="choice-restricted">Choice-Restricted</option>
                                        <option value="banned">Banned (cannot use)</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="adminBanNotes">Notes</label>
                                    <input type="text" id="adminBanNotes" placeholder="Optional note..." autocomplete="off" />
                                </div>
                                <p id="adminBanStatus" class="admin-form-status"></p>
                                <div class="modal-actions">
                                    <button type="submit" class="btn-save">Save</button>
                                    <button type="button" class="btn-cancel" data-admin-action="close-ban-modal">Cancel</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Store Modal -->
                    <div id="adminStoreModal" class="modal-overlay">
                        <div class="modal-content">
                            <h3 class="admin-modal-title">Store</h3>
                            <form id="adminStoreForm">
                                <input type="hidden" id="adminStoreId" />
                                <input type="hidden" id="adminStoreLogoUrl" />
                                <div class="form-group">
                                    <label for="adminStoreName">Name <span class="required">*</span></label>
                                    <input type="text" id="adminStoreName" placeholder="e.g. Card Kingdom SP" required autocomplete="off" />
                                </div>
                                <div class="form-group">
                                    <label for="adminStoreBandaiNick">Bandai Nick</label>
                                    <input type="text" id="adminStoreBandaiNick" placeholder="Nickname used in Bandai TCG+ (optional)" autocomplete="off" />
                                </div>
                                <div class="form-group">
                                    <label>Store Logo</label>
                                    <div class="admin-bg-selected-preview" id="adminStoreLogoPreviewWrap" style="display:none;">
                                        <img id="adminStoreLogoPreview" alt="Store logo" style="max-height:80px;object-fit:contain;border-radius:8px;" />
                                        <button type="button" class="admin-bg-clear-btn" data-admin-action="clear-store-logo" title="Remove logo">✕</button>
                                    </div>
                                    <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;">
                                        <label class="btn-secondary admin-upload-label">
                                            Upload logo
                                            <input type="file" id="adminStoreLogoFile" accept="image/*" style="display:none;" />
                                        </label>
                                        <button type="button" class="btn-secondary" data-admin-action="browse-store-logos">Browse existing</button>
                                    </div>
                                    <div id="adminStoreBucketBrowser" class="admin-bucket-browser is-hidden">
                                        <div id="adminStoreBucketImages" class="admin-bucket-grid"></div>
                                    </div>
                                    <p id="adminStoreLogoUploadStatus" class="admin-form-status" style="margin-top:4px;"></p>
                                </div>
                                <div class="form-group" style="display:flex;gap:24px;align-items:center;">
                                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                                        <input type="checkbox" id="adminStoreIsActive" />
                                        Active
                                    </label>
                                </div>
                                <p id="adminStoreStatus" class="admin-form-status"></p>
                                <div class="modal-actions">
                                    <button type="submit" class="btn-save">Save</button>
                                    <button type="button" class="btn-cancel" data-admin-action="close-store-modal">Cancel</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div id="createModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>New Tournament</h2>
                    <button type="button" id="btnCreateModalCloseX" class="player-modal-close" aria-label="Close">&times;</button>
                </div>
                <form id="createTournamentForm">
                    <div class="form-group">
                        <label>Bandai TCG+ OCR</label>
                        <input
                            type="file"
                            id="createOcrFilesInput"
                            accept="image/*"
                            multiple
                            hidden
                        />
                        <div class="ocr-import-actions">
                            <button type="button" id="btnSelectOcrPrints" class="btn-add-result">
                                + Carregar print(s) e preencher
                            </button>
                        </div>
                        <small id="createOcrSelectedInfo" class="field-hint"></small>
                        <small id="createOcrStatus" class="field-hint"></small>
                    </div>
                    <div class="form-group">
                        <label>Store<span class="required">*</span></label>
                        <select id="createStoreSelect" required></select>
                    </div>
                    <div class="form-group">
                        <label>Tournament Date<span class="required">*</span></label>
                        <input type="date" id="createTournamentDate" required />
                    </div>
                    <div class="form-group">
                        <label>Tournament Name<span class="required">*</span></label>
                        <select id="createTournamentName" required>
                            <option value="">Select tournament name...</option>
                            <option value="Semanal">Semanal</option>
                            <option value="Mensal">Mensal</option>
                            <option value="Quinzenal">Quinzenal</option>
                            <option value="Pre-Release">Pre-Release</option>
                            <option value="Top 8">Top 8</option>
                            <option value="Win-A-Box">Win-A-Box</option>
                            <option value="Evo Cup">Evo Cup</option>
                            <option value="Regulation Battle">Regulation Battle</option>
                            <option value="For Fun">For Fun</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Format</label>
                        <select id="createTournamentFormat">
                            <option value="">Select format...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Total Players<span class="required">*</span></label>
                        <input
                            type="number"
                            id="createTotalPlayers"
                            min="1"
                            max="36"
                            placeholder="Ex: 8"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label>Tournament Results<span class="required">*</span></label>
                        <div id="createResultsRows"></div>
                        <button type="button" id="btnAddResultRow" class="btn-add-result">
                            + Add Player Result
                        </button>
                        <small class="field-hint"
                            >Placement is automatic as you add players (up to 36).</small
                        >
                    </div>
                    <div class="form-group">
                        <label>Instagram Link</label>
                        <input
                            type="url"
                            id="createInstagramLink"
                            placeholder="https://instagram.com/..."
                        />
                    </div>
                    <div class="modal-actions">
                        <button type="submit" class="btn-save">Create</button>
                        <button type="button" id="btnCreateCancel" class="btn-cancel">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div id="editModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Edit Tournament</h2>
                    <button type="button" id="btnEditModalCloseX" class="player-modal-close" aria-label="Close">&times;</button>
                </div>
                <form id="editTournamentForm">
                    <div class="form-group">
                        <label>Bandai TCG+ OCR</label>
                        <input
                            type="file"
                            id="editOcrFilesInput"
                            accept="image/*"
                            multiple
                            hidden
                        />
                        <div class="ocr-import-actions">
                            <button type="button" id="btnSelectEditOcrPrints" class="btn-add-result">
                                + Carregar print(s) e preencher
                            </button>
                        </div>
                        <small id="editOcrSelectedInfo" class="field-hint"></small>
                        <small id="editOcrStatus" class="field-hint"></small>
                    </div>
                    <div class="form-group">
                        <label>Store<span class="required">*</span></label>
                        <select id="editStoreSelect" required></select>
                    </div>
                    <div class="form-group">
                        <label>Tournament Date<span class="required">*</span></label>
                        <input type="date" id="editTournamentDate" required />
                    </div>
                    <div class="form-group">
                        <label>Tournament Name<span class="required">*</span></label>
                        <select id="editTournamentName" required>
                            <option value="">Select tournament name...</option>
                            <option value="Semanal">Semanal</option>
                            <option value="Mensal">Mensal</option>
                            <option value="Quinzenal">Quinzenal</option>
                            <option value="Pre-Release">Pre-Release</option>
                            <option value="Top 8">Top 8</option>
                            <option value="Win-A-Box">Win-A-Box</option>
                            <option value="Evo Cup">Evo Cup</option>
                            <option value="Regulation Battle">Regulation Battle</option>
                            <option value="For Fun">For Fun</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Format</label>
                        <select id="editTournamentFormat">
                            <option value="">Select format...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Total Players<span class="required">*</span></label>
                        <input type="number" id="editTotalPlayers" min="1" max="36" required />
                    </div>
                    <div class="form-group">
                        <label>Tournament Results<span class="required">*</span></label>
                        <div id="editResultsRows"></div>
                        <button type="button" id="btnAddEditResultRow" class="btn-add-result">
                            + Add Player Result
                        </button>
                        <small class="field-hint"
                            >Placement is automatic as you add players (up to 36).</small
                        >
                    </div>
                    <div class="form-group">
                        <label>Instagram Link</label>
                        <input
                            type="url"
                            id="editInstagramLink"
                            placeholder="https://instagram.com/..."
                        />
                    </div>
                    <div class="modal-actions">
                        <button type="submit" class="btn-save">Save</button>
                        <button type="button" id="btnEditCancel" class="btn-cancel">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
        <script src="config/supabase.js"></script>
        <script src="config/api-client.js"></script>
        <script src="config/ui-state.js"></script>
        <script src="config/app-version.js"></script>
        <script src="config/register-sw.js"></script>
        <script src="torneios/list-tournaments/calendar-view/calendar.js"></script>
        <script src="torneios/list-tournaments/script.js"></script>
        <script src="torneios/edit-tournament/modal.js"></script>

        <!-- Player add/edit modal — fora do container para position:fixed funcionar -->
        <div id="playerModal" class="player-modal-overlay u-hidden" role="dialog" aria-modal="true" aria-labelledby="playerModalTitle">
            <div class="player-modal-box">
                <div class="player-modal-header">
                    <h3 id="playerModalTitle" class="player-modal-title">New Player</h3>
                    <button type="button" id="playerModalCloseBtn" class="player-modal-close" aria-label="Close">&times;</button>
                </div>
                <input
                    type="text"
                    id="playerName"
                    class="players-name-input player-modal-input"
                    placeholder="Player name..."
                    autocomplete="off"
                />
                <div class="player-modal-actions">
                    <button type="button" id="playerModalCancelBtn" class="btn-cancel">Cancel</button>
                    <button type="button" id="submitBtn" class="btn-primary">Save</button>
                </div>
            </div>
        </div>
    </body>
</html>
